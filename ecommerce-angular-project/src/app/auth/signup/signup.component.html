<div class="signup-container">
  <div class="sign-up">
       <h2>Create Account</h2>
       <form [formGroup]="signupForm" (ngSubmit) = "onSubmit()">

          <div class="form-group">
            <label>Name</label>
              <input type="text" 
                     formControlName="name" 
                     placeholder="Enter Your Name">
              <small *ngIf="signupForm.get('name')?.touched && signupForm.get('name')?.invalid">
                        Name is required
              </small>
          </div>

          <div class="form-group">
            <label>Email</label>
              <input type="email" 
                     formControlName="email" 
                     placeholder="Enter Your Email">
              <small *ngIf="signupForm.get('email')?.touched && signupForm.get('email')?.errors?.['required']">
                        Email is required
              </small>
              <small *ngIf="signupForm.get('email')?.errors?.['email']">
                        Invalid email format
              </small>
          </div>

          <div class="form-group">
            <label>Mobile Number</label>
              <input type="text" 
                     formControlName="mobileNumber" 
                     placeholder="Enter Your Mobile Number">
              <small *ngIf="signupForm.get('mobileNumber')?.touched && signupForm.get('mobileNumber')?.invalid">
                        Enter valid 10 digit mobile number
              </small>
          </div>

          <div class="form-group">
            <label>Password</label>
              <input 
                    type="password"
                    formControlName="password"
                    placeholder="Enter password">
              <small *ngIf="signupForm.get('password')?.touched && signupForm.get('password')?.invalid">
                      Password must be minimum 6 characters
              </small>
          </div>

          <!-- Server Success -->
      <div *ngIf="serverMessage" class="success">
        {{ serverMessage }}
      </div>

      <!-- Server Error -->
      <div *ngIf="serverError" class="error">
        {{ serverError }}
      </div>

      <button type="submit" [disabled]="loading">
        {{ loading ? 'Processing...' : 'Sign Up' }}
      </button>
       </form>
  </div>
</div>
